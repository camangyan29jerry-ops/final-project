<div class="dash-page">
    <div class="data-table-wrap">
        <div class="data-table-header">
            <div>
                <h1>Accounts</h1>
                <p>Manage all registered user accounts</p>
            </div>
            <a routerLink="add" class="btn-create">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Create Account
            </a>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th style="width:35%">Name</th>
                    <th style="width:30%">Email</th>
                    <th style="width:20%">Role</th>
                    <th style="width:15%"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let account of accounts">
                    <td>{{account.title}} {{account.firstName}} {{account.lastName}}</td>
                    <td style="color: var(--text-secondary);">{{account.email}}</td>
                    <td>
                        <span class="role-pill" [ngClass]="{ 'admin': account.role === 'Admin', 'user': account.role === 'User' }">{{account.role}}</span>
                    </td>
                    <td style="white-space: nowrap; text-align: right;">
                        <a routerLink="edit/{{account.id}}" class="btn-sm btn-edit me-1">Edit</a>
                        <button (click)="deleteAccount(account.id)" class="btn-sm btn-del" [disabled]="account.isDeleting">
                            <span *ngIf="account.isDeleting" class="spinner-border spinner-border-sm"></span>
                            <span *ngIf="!account.isDeleting">Delete</span>
                        </button>
                    </td>
                </tr>
                <tr *ngIf="!accounts">
                    <td colspan="4" class="table-loader">
                        <div class="spinner"></div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
