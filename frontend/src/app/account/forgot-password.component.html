<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-icon">📧</div>
    <h2>Forgot password?</h2>
    <p>We'll send a reset link to your email</p>
  </div>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="auth-field">
      <label>Email address</label>
      <input type="email" formControlName="email" placeholder="name@domain.com"
        [ngClass]="{ 'is-invalid': submitted && f.email.errors }" />
      <div *ngIf="submitted && f.email.errors" class="field-error">
        <span *ngIf="f.email.errors.required">Email is required</span>
        <span *ngIf="f.email.errors.email">Enter a valid email</span>
      </div>
    </div>
    <button [disabled]="loading" class="auth-btn">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
      Send reset link
    </button>
    <div class="auth-links" style="justify-content:center">
      <a routerLink="../login">← Back to login</a>
    </div>
  </form>
</div>
