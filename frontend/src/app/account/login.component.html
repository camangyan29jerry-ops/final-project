<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-icon">🔐</div>
    <h2>Welcome back</h2>
    <p>Sign in to your account to continue</p>
  </div>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="auth-field">
      <label>Email address</label>
      <input type="email" formControlName="email" placeholder="name@domain.com"
        [ngClass]="{ 'is-invalid': submitted && f.email.errors }" />
      <div *ngIf="submitted && f.email.errors" class="field-error">
        <span *ngIf="f.email.errors.required">Email is required</span>
        <span *ngIf="f.email.errors.email">Enter a valid email</span>
      </div>
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" formControlName="password" placeholder="••••••••"
        [ngClass]="{ 'is-invalid': submitted && f.password.errors }" />
      <div *ngIf="submitted && f.password.errors" class="field-error">
        <span *ngIf="f.password.errors.required">Password is required</span>
      </div>
    </div>
    <div class="forgot-row">
      <a routerLink="../forgot-password">Forgot password?</a>
    </div>
    <button [disabled]="submitting" class="auth-btn">
      <span *ngIf="submitting" class="spinner-border spinner-border-sm me-1"></span>
      Sign in
    </button>
    <div class="auth-links">
      <span>Don't have an account?</span>
      <a routerLink="../register">Create account</a>
    </div>
  </form>
</div>
