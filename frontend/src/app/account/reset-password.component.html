<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-icon">🔑</div>
    <h2>Reset password</h2>
    <p>Choose a strong new password</p>
  </div>
  <div *ngIf="tokenStatus == TokenStatus.Validating" class="token-checking">
    <div class="token-spinner"></div>
    <p>Verifying your link...</p>
  </div>
  <div *ngIf="tokenStatus == TokenStatus.Invalid" class="token-invalid">
    <div class="auth-icon">❌</div>
    <p>This link has expired or is invalid.</p>
    <a routerLink="../forgot-password" class="auth-btn" style="display:block;text-align:center;text-decoration:none;margin-top:16px">Request a new link</a>
  </div>
  <form *ngIf="tokenStatus == TokenStatus.Valid" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="auth-field">
      <label>New password</label>
      <input type="password" formControlName="password" placeholder="Min. 6 characters"
        [ngClass]="{ 'is-invalid': submitted && f.password.errors }" />
      <div *ngIf="submitted && f.password.errors" class="field-error">
        <span *ngIf="f.password.errors.required">Password is required</span>
        <span *ngIf="f.password.errors.minlength">Must be at least 6 characters</span>
      </div>
    </div>
    <div class="auth-field">
      <label>Confirm password</label>
      <input type="password" formControlName="confirmPassword" placeholder="Repeat password"
        [ngClass]="{ 'is-invalid': submitted && f.confirmPassword.errors }" />
      <div *ngIf="submitted && f.confirmPassword.errors" class="field-error">
        <span *ngIf="f.confirmPassword.errors.required">Please confirm your password</span>
        <span *ngIf="f.confirmPassword.errors.mustMatch">Passwords do not match</span>
      </div>
    </div>
    <button [disabled]="loading" class="auth-btn">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
      Reset password
    </button>
    <div class="auth-links" style="justify-content:center">
      <a routerLink="../login">← Back to login</a>
    </div>
  </form>
</div>
